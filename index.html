<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Focus Timer</title>
<style>
/* ══════════════════════════════════════
   MODO POST-IT (janela desktop avulsa)
══════════════════════════════════════ */
body.postit-mode {
  margin:0; padding:0; background:transparent;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow:hidden; user-select:none;
  -webkit-app-region:no-drag;
}
.postit-win {
  width:100vw; height:100vh;
  border-radius:4px;
  display:flex; flex-direction:column;
  padding:8px 10px;
  box-shadow:3px 4px 14px rgba(0,0,0,0.35);
  overflow:hidden;
}
.postit-win .pi-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:5px; -webkit-app-region:drag; cursor:grab;
}
.postit-win .pi-label {
  font-size:10px; font-weight:600; opacity:0.5;
  text-transform:uppercase; letter-spacing:0.5px;
}
.postit-win .pi-close {
  background:none; border:none; font-size:14px;
  cursor:pointer; opacity:0.45; color:#333; line-height:1;
  -webkit-app-region:no-drag;
}
.postit-win .pi-close:hover { opacity:0.85; }
.postit-win textarea {
  flex:1; background:transparent; border:none; resize:none;
  font-size:13px; font-family:inherit; line-height:1.55;
  outline:none; color:#2a2a2a;
  -webkit-app-region:no-drag;
}
.postit-win .pi-resize {
  position:absolute; bottom:3px; right:4px;
  font-size:10px; opacity:0.25; cursor:se-resize;
  -webkit-app-region:no-drag;
}

/* ══════════════════════════════════════
   MODO PAINEL RETRÁTIL
══════════════════════════════════════ */
body.panel-mode {
  margin:0; padding:0; background:transparent; overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:14px; color:#e8e8e8;
}

/* Aba lateral (sempre visível) */
#panel-tab {
  position:fixed; top:50%; transform:translateY(-50%);
  width:36px; height:80px;
  background:#1D9E75;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; z-index:100;
  border-radius:0;
  transition:background 0.15s;
  writing-mode:vertical-rl;
  font-size:11px; font-weight:600; letter-spacing:1px;
  color:#fff; text-transform:uppercase;
}
#panel-tab:hover { background:#0F6E56; }
body.side-right #panel-tab { right:0; border-radius:8px 0 0 8px; }
body.side-left  #panel-tab { left:0;  border-radius:0 8px 8px 0; }

/* Conteúdo do painel */
#panel-content {
  position:fixed; top:0; height:100vh;
  width:364px;
  background:#1a1a1a;
  overflow-y:auto; overflow-x:hidden;
  display:none;
  flex-direction:column;
  transition:opacity 0.2s;
}
body.side-right #panel-content { right:36px; }
body.side-left  #panel-content { left:36px; }
body.panel-open #panel-content { display:flex; }

/* Scrollbar */
#panel-content::-webkit-scrollbar { width:4px; }
#panel-content::-webkit-scrollbar-track { background:transparent; }
#panel-content::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:99px; }

.panel-inner { padding:16px; flex:1; }

/* ── variáveis de cor para o painel ── */
:root {
  --bg:#1a1a1a; --bg2:#242424; --bg3:#2e2e2e;
  --border:rgba(255,255,255,0.10); --border2:rgba(255,255,255,0.18);
  --text:#e8e8e8; --text2:#999; --text3:#666;
  --green:#1D9E75; --green-dk:#0F6E56; --green-bg:rgba(29,158,117,0.12);
  --red:#E24B4A; --red-bg:rgba(226,75,74,0.10);
  --amber:#BA7517; --amber-bg:rgba(186,117,23,0.12);
  --radius:10px; --radius-sm:6px;
}

/* Header do painel */
.panel-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.panel-header h1 { font-size:16px; font-weight:600; letter-spacing:-0.3px; }
.header-actions { display:flex; align-items:center; gap:8px; }
.save-ind { font-size:11px; color:var(--green); opacity:0; transition:opacity 0.4s; }
.save-ind.show { opacity:1; }
.side-btn {
  font-size:11px; border:0.5px solid var(--border2);
  border-radius:var(--radius-sm); padding:4px 8px;
  background:var(--bg2); color:var(--text2); cursor:pointer;
}
.side-btn:hover { color:var(--text); }

/* Notif btn */
.notif-btn {
  font-size:11px; border:0.5px solid var(--border2);
  border-radius:var(--radius-sm); padding:4px 8px;
  background:var(--bg2); color:var(--text2); cursor:pointer;
}
.notif-btn.granted { color:var(--green); border-color:var(--green); background:var(--green-bg); }

/* Tabs */
.tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:14px; }
.tab {
  font-size:11px; padding:6px 10px; border:none;
  background:none; color:var(--text2); cursor:pointer;
  border-bottom:2px solid transparent; margin-bottom:-1px; white-space:nowrap;
}
.tab.active { color:var(--text); border-bottom-color:var(--green); font-weight:500; }
.pnl { display:none; }
.pnl.active { display:block; }

/* Cards */
.card {
  background:var(--bg2); border:0.5px solid var(--border);
  border-radius:var(--radius); padding:11px 13px; margin-bottom:8px;
}
.card.running { border-color:var(--green); }
.card.done    { border-color:var(--red); animation:pulse 1.5s ease-in-out infinite; }
.card.firing  { border-color:var(--red); animation:pulse 1.5s ease-in-out infinite; }
.card.muted   { opacity:0.45; }

/* Form */
.add-form {
  background:var(--bg3); border:0.5px solid var(--border);
  border-radius:var(--radius); padding:12px; margin-top:4px;
}
.form-row { display:flex; gap:6px; flex-wrap:wrap; align-items:flex-end; margin-bottom:6px; }
.form-row:last-child { margin-bottom:0; }
.fg { display:flex; flex-direction:column; gap:3px; }
.fg label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; }
.fg input,.fg select {
  font-size:12px; padding:5px 7px; border-radius:var(--radius-sm);
  border:0.5px solid var(--border2); background:var(--bg2); color:var(--text); outline:none;
}
.fg input:focus,.fg select:focus { border-color:var(--green); }
.fg input[type=number] { width:60px; }
.fg input[type=text]   { width:110px; }

.btn-green {
  background:var(--green); color:#fff; border:none;
  border-radius:var(--radius-sm); padding:6px 12px;
  font-size:12px; cursor:pointer; font-weight:500;
}
.btn-green:hover { background:var(--green-dk); }
.tbtn {
  border:0.5px solid var(--border2); background:var(--bg3);
  border-radius:var(--radius-sm); padding:3px 8px;
  font-size:11px; cursor:pointer; color:var(--text2); white-space:nowrap;
}
.tbtn:hover { color:var(--text); }
.tbtn.danger { color:#f08080; border-color:rgba(226,75,74,0.4); }
.tbtn.mute   { color:#d4a057; border-color:rgba(186,117,23,0.4); }

.slabel {
  font-size:10px; color:var(--text3); text-transform:uppercase;
  letter-spacing:0.8px; margin-bottom:8px; font-weight:500;
}
.divider { height:1px; background:var(--border); margin:12px 0; }
.empty-msg { font-size:12px; color:var(--text3); padding:4px 0 10px; }

/* Timer internals */
.timer-card { display:flex; align-items:center; gap:8px; }
.t-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.t-info { flex:1; min-width:0; }
.t-name { font-size:12px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.t-meta { font-size:10px; color:var(--text3); margin-top:1px; }
.t-display { font-size:18px; font-weight:500; font-family:'SF Mono','Fira Code',monospace; min-width:62px; text-align:right; }
.t-display.done { color:var(--red); }

/* Sound */
.sound-row { display:flex; gap:5px; flex-wrap:wrap; margin-top:8px; }
.sound-opt {
  display:flex; align-items:center; gap:4px; font-size:11px;
  color:var(--text2); cursor:pointer; border:0.5px solid var(--border2);
  border-radius:var(--radius-sm); padding:3px 8px; background:var(--bg2);
}
.sound-opt input { accent-color:var(--green); }
.sound-opt.selected { border-color:var(--green); color:var(--green); background:var(--green-bg); }
.preview-btn { font-size:11px; color:var(--green); background:none; border:none; cursor:pointer; text-decoration:underline; }

/* Agenda */
.evt-card {
  border-radius:var(--radius); border:0.5px solid var(--border);
  background:var(--bg2); overflow:hidden; margin-bottom:8px;
}
.evt-card.past { opacity:0.4; }
.evt-main { display:flex; align-items:center; gap:8px; padding:9px 12px; cursor:pointer; }
.evt-main:hover { background:var(--bg3); }
.evt-time-col { min-width:62px; }
.evt-time { font-size:13px; font-weight:500; font-family:'SF Mono',monospace; }
.evt-datestr { font-size:10px; color:var(--text3); margin-top:1px; }
.evt-info { flex:1; min-width:0; }
.evt-title { font-size:12px; font-weight:500; }
.evt-desc  { font-size:10px; color:var(--text2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.evt-right { display:flex; align-items:center; gap:5px; flex-shrink:0; }
.a-cat { font-size:9px; padding:2px 6px; border-radius:99px; font-weight:500; white-space:nowrap; }
.cat-work    { background:rgba(55,138,221,0.2); color:#7ab8f5; }
.cat-pessoal { background:rgba(212,83,126,0.2); color:#e898bb; }
.cat-saude   { background:rgba(99,153,34,0.2);  color:#9eca60; }
.cat-outro   { background:rgba(136,135,128,0.2);color:#aaa; }
.evt-edit-form { border-top:1px solid var(--border); background:var(--bg3); padding:10px 12px; display:none; }
.evt-edit-form.open { display:block; }
.edit-row { display:flex; gap:6px; flex-wrap:wrap; align-items:flex-end; margin-bottom:6px; }
.efg { display:flex; flex-direction:column; gap:3px; }
.efg label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; }
.efg input,.efg select { font-size:12px; padding:4px 7px; border-radius:var(--radius-sm); border:0.5px solid var(--border2); background:var(--bg2); color:var(--text); outline:none; }
.btn-save   { background:var(--green); color:#fff; border:none; border-radius:var(--radius-sm); padding:4px 10px; font-size:11px; cursor:pointer; font-weight:500; }
.btn-cancel { background:none; border:0.5px solid var(--border2); border-radius:var(--radius-sm); padding:4px 8px; font-size:11px; cursor:pointer; color:var(--text2); }
.btn-del    { background:none; border:0.5px solid rgba(226,75,74,0.4); border-radius:var(--radius-sm); padding:4px 8px; font-size:11px; cursor:pointer; color:#f08080; }
.today-badge { font-size:10px; background:var(--green-bg); color:var(--green); border-radius:99px; padding:2px 8px; font-weight:500; }

/* Recurrences */
.rec-card { display:flex; align-items:center; gap:8px; }
.rec-icon { width:30px; height:30px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.rec-icon.daily   { background:var(--green-bg); }
.rec-icon.weekly  { background:rgba(55,138,221,0.15); }
.rec-icon.hourly  { background:var(--amber-bg); }
.rec-icon.monthly { background:rgba(212,83,126,0.15); }
.rec-info { flex:1; min-width:0; }
.rec-name   { font-size:12px; font-weight:500; }
.rec-detail { font-size:10px; color:var(--text3); margin-top:1px; }
.rec-next   { font-size:10px; color:var(--green); font-weight:500; margin-top:1px; }
.rec-next.soon { color:var(--amber); }
.weekdays { display:flex; gap:3px; margin-top:8px; flex-wrap:wrap; }
.wd {
  width:32px; height:26px; border:0.5px solid var(--border2);
  border-radius:var(--radius-sm); font-size:10px; cursor:pointer;
  background:var(--bg2); color:var(--text2);
  display:flex; align-items:center; justify-content:center; font-weight:500; user-select:none;
}
.wd.on { background:var(--green); color:#fff; border-color:var(--green); }
.type-tabs { display:flex; gap:3px; margin-bottom:10px; flex-wrap:wrap; }
.type-tab {
  font-size:11px; padding:3px 8px; border:0.5px solid var(--border2);
  border-radius:var(--radius-sm); cursor:pointer; background:var(--bg2); color:var(--text2);
}
.type-tab.active { background:var(--green); color:#fff; border-color:var(--green); }

/* Post-its (lista no painel) */
.postit-item {
  display:flex; align-items:center; gap:8px;
  background:var(--bg2); border:0.5px solid var(--border);
  border-radius:var(--radius); padding:9px 12px; margin-bottom:6px;
}
.pi-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
.pi-preview { flex:1; font-size:11px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.clear-btn { font-size:11px; color:#f08080; background:none; border:0.5px solid rgba(226,75,74,0.35); border-radius:var(--radius-sm); padding:4px 10px; cursor:pointer; margin-top:8px; }

@keyframes pulse {
  0%,100% { box-shadow:0 0 0 0 rgba(226,75,74,0.4); }
  50%      { box-shadow:0 0 0 5px rgba(226,75,74,0.08); }
}
</style>
</head>
<body>

<script>
// ══════════════════════════════════════
// Detecta modo pelo URL param ?mode=postit
// ══════════════════════════════════════
const urlParams = new URLSearchParams(window.location.search)
const MODE = urlParams.get('mode') || 'panel'

if (MODE === 'postit') {
  document.body.className = 'postit-mode'
  const color = decodeURIComponent(urlParams.get('color') || '#FAF0A0')
  const text  = decodeURIComponent(urlParams.get('text')  || '')
  const id    = urlParams.get('id')

  document.body.innerHTML = `
    <div class="postit-win" id="pw" style="background:${color}">
      <div class="pi-header">
        <span class="pi-label">nota</span>
        <button class="pi-close" id="pi-close">✕</button>
      </div>
      <textarea id="pi-ta" placeholder="Escreva aqui...">${text}</textarea>
    </div>`

  const ta = document.getElementById('pi-ta')
  const api = window.electronAPI

  // Fechar
  document.getElementById('pi-close').addEventListener('click', () => {
    api.closePostit(id)
  })

  // Sincroniza texto de volta ao painel
  ta.addEventListener('input', () => {
    api.postitText(id, ta.value, color)
  })

  // Recebe atualização de texto do painel (se editado lá)
  api.onPostitTextUpdate(({ text: t, color: c }) => {
    ta.value = t
    document.getElementById('pw').style.background = c
  })

} else {
  // ══════════════════════════════════════
  // MODO PAINEL
  // ══════════════════════════════════════
  document.body.className = 'panel-mode side-right'

  document.body.innerHTML = `
  <div id="panel-tab" onclick="togglePanel()">FT</div>
  <div id="panel-content">
    <div class="panel-inner">
      <div class="panel-header">
        <h1>Focus Timer</h1>
        <div class="header-actions">
          <span class="save-ind" id="save-ind">✓ Salvo</span>
          <button class="side-btn" onclick="switchSide()" title="Alternar lado">⇔ Lado</button>
          <button class="notif-btn" id="notif-btn" onclick="requestNotif()">🔔 Notif</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('timers',this)">Timers</button>
        <button class="tab" onclick="switchTab('agenda',this)">Agenda</button>
        <button class="tab" onclick="switchTab('rec',this)">Recorrências</button>
        <button class="tab" onclick="switchTab('notas',this)">Post-its</button>
      </div>

      <!-- TIMERS -->
      <div class="pnl active" id="pnl-timers">
        <div class="slabel">Ativos</div>
        <div id="timers-list"></div>
        <div class="add-form">
          <div class="form-row">
            <div class="fg"><label>Nome</label><input type="text" id="f-name" placeholder="Reunião"/></div>
            <div class="fg"><label>Min</label><input type="number" id="f-min" value="25" min="1" max="999"/></div>
            <div class="fg"><label>Tipo</label><select id="f-type"><option value="once">Único</option><option value="repeat">Recorrente</option></select></div>
          </div>
          <div class="form-row">
            <div class="fg"><label>Cor</label><select id="f-color"><option value="#1D9E75">Verde</option><option value="#378ADD">Azul</option><option value="#D85A30">Coral</option><option value="#BA7517">Âmbar</option><option value="#D4537E">Rosa</option></select></div>
            <button class="btn-green" onclick="addTimer()">+ Adicionar</button>
          </div>
          <div class="divider"></div>
          <div class="slabel" style="margin-bottom:6px;">Som do alarme</div>
          <div class="sound-row">
            <label class="sound-opt selected" id="sl-beep"><input type="radio" name="sound" value="beep" checked onchange="selectSound(this)"> Bipe</label>
            <label class="sound-opt" id="sl-bell"><input type="radio" name="sound" value="bell" onchange="selectSound(this)"> Sino</label>
            <label class="sound-opt" id="sl-digital"><input type="radio" name="sound" value="digital" onchange="selectSound(this)"> Digital</label>
            <label class="sound-opt" id="sl-soft"><input type="radio" name="sound" value="soft" onchange="selectSound(this)"> Suave</label>
            <button class="preview-btn" onclick="playSound(currentSound)">Testar</button>
          </div>
        </div>
      </div>

      <!-- AGENDA -->
      <div class="pnl" id="pnl-agenda">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
          <div class="slabel" style="margin:0;">Hoje</div>
          <span class="today-badge" id="today-label"></span>
        </div>
        <div id="agenda-today"></div>
        <div class="divider"></div>
        <div class="slabel">Próximos</div>
        <div id="agenda-upcoming"></div>
        <div class="divider"></div>
        <div class="slabel">Passados</div>
        <div id="agenda-past"></div>
        <div class="divider"></div>
        <div class="slabel" style="margin-bottom:8px;">Novo evento</div>
        <div class="add-form">
          <div class="form-row">
            <div class="fg"><label>Título</label><input type="text" id="a-title" placeholder="Dentista" style="width:110px;"/></div>
            <div class="fg"><label>Data</label><input type="date" id="a-date" style="width:120px;"/></div>
          </div>
          <div class="form-row">
            <div class="fg"><label>Hora</label><input type="time" id="a-time" style="width:85px;"/></div>
            <div class="fg"><label>Categoria</label><select id="a-cat"><option value="work">Trabalho</option><option value="pessoal">Pessoal</option><option value="saude">Saúde</option><option value="outro">Outro</option></select></div>
          </div>
          <div class="form-row">
            <div class="fg"><label>Descrição</label><input type="text" id="a-desc" placeholder="Detalhes..." style="width:200px;"/></div>
            <button class="btn-green" onclick="addEvent()">+ Agendar</button>
          </div>
        </div>
      </div>

      <!-- RECORRÊNCIAS -->
      <div class="pnl" id="pnl-rec">
        <div class="slabel">Alarmes ativos</div>
        <div id="rec-list"></div>
        <div class="add-form">
          <div class="type-tabs">
            <button class="type-tab active" id="rt-daily"   onclick="setRecType('daily',this)">Diário</button>
            <button class="type-tab"        id="rt-weekly"  onclick="setRecType('weekly',this)">Semana</button>
            <button class="type-tab"        id="rt-hourly"  onclick="setRecType('hourly',this)">Horas</button>
            <button class="type-tab"        id="rt-monthly" onclick="setRecType('monthly',this)">Mensal</button>
          </div>
          <div id="rf-daily">
            <div class="form-row">
              <div class="fg"><label>Nome</label><input type="text" id="r-daily-name" placeholder="Remédio"/></div>
              <div class="fg"><label>Hora</label><input type="time" id="r-daily-time" value="08:00" style="width:85px;"/></div>
              <button class="btn-green" onclick="addRec('daily')">+</button>
            </div>
          </div>
          <div id="rf-weekly" style="display:none;">
            <div class="form-row">
              <div class="fg"><label>Nome</label><input type="text" id="r-weekly-name" placeholder="Aula de música"/></div>
              <div class="fg"><label>Hora</label><input type="time" id="r-weekly-time" value="19:00" style="width:85px;"/></div>
            </div>
            <div class="weekdays" id="wd-picker">
              <div class="wd" data-d="0" onclick="toggleWd(this)">Dom</div>
              <div class="wd" data-d="1" onclick="toggleWd(this)">Seg</div>
              <div class="wd" data-d="2" onclick="toggleWd(this)">Ter</div>
              <div class="wd" data-d="3" onclick="toggleWd(this)">Qua</div>
              <div class="wd" data-d="4" onclick="toggleWd(this)">Qui</div>
              <div class="wd" data-d="5" onclick="toggleWd(this)">Sex</div>
              <div class="wd" data-d="6" onclick="toggleWd(this)">Sáb</div>
            </div>
            <button class="btn-green" style="margin-top:8px;" onclick="addRec('weekly')">+ Adicionar</button>
          </div>
          <div id="rf-hourly" style="display:none;">
            <div class="form-row">
              <div class="fg"><label>Nome</label><input type="text" id="r-hourly-name" placeholder="Beber água"/></div>
              <div class="fg"><label>A cada (h)</label><input type="number" id="r-hourly-interval" value="4" min="1" max="23" style="width:55px;"/></div>
            </div>
            <div class="form-row">
              <div class="fg"><label>Início</label><input type="time" id="r-hourly-start" value="08:00" style="width:85px;"/></div>
              <div class="fg"><label>Fim</label><input type="time" id="r-hourly-end" value="22:00" style="width:85px;"/></div>
              <button class="btn-green" onclick="addRec('hourly')">+</button>
            </div>
          </div>
          <div id="rf-monthly" style="display:none;">
            <div class="form-row">
              <div class="fg"><label>Nome</label><input type="text" id="r-monthly-name" placeholder="Pagar conta"/></div>
              <div class="fg"><label>Dia</label><input type="number" id="r-monthly-day" value="10" min="1" max="28" style="width:55px;"/></div>
              <div class="fg"><label>Hora</label><input type="time" id="r-monthly-time" value="09:00" style="width:85px;"/></div>
              <button class="btn-green" onclick="addRec('monthly')">+</button>
            </div>
          </div>
        </div>
      </div>

      <!-- POST-ITS -->
      <div class="pnl" id="pnl-notas">
        <div class="slabel">Post-its no desktop</div>
        <p style="font-size:12px;color:var(--text2);margin-bottom:12px;">Cada post-it abre como uma janela livre no desktop — arraste para onde quiser.</p>
        <button class="btn-green" onclick="addPostit()">+ Novo post-it</button>
        <div style="margin-top:12px;" id="postits-list"></div>
        <div class="divider"></div>
        <button class="clear-btn" onclick="clearAll()">Limpar todos os dados</button>
      </div>

    </div>
  </div>`

  // ══════════════════════════════════════
  // LÓGICA DO PAINEL
  // ══════════════════════════════════════

  const api = window.electronAPI
  const STORE_KEY = 'focustimer_v6'
  let timers=[], nextId=1, currentSound='beep'
  let events=[], nextEid=1, editingId=null
  let recs=[], nextRid=1
  let postits=[]  // { id, color, text, x, y, w, h, open }
  let nextPid=1
  let notifGranted=false
  let currentSide='right'
  const piColors=['#FAF0A0','#B5F0C0','#B5DAFF','#FFD0B5','#F5B5D8']
  const WDNAMES=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']
  const ICONS={daily:'☀',weekly:'📅',hourly:'⏱',monthly:'🗓'}
  const ICONCLASS={daily:'daily',weekly:'weekly',hourly:'hourly',monthly:'monthly'}

  // ── persistência ──
  function save(){
    try{localStorage.setItem(STORE_KEY,JSON.stringify({
      timers:timers.map(t=>({...t,interval:null,running:false})),
      nextId,currentSound,events,nextEid,
      recs:recs.map(r=>({...r,firing:false})),nextRid,
      postits,nextPid,side:currentSide
    }))}catch(e){}
    const ind=document.getElementById('save-ind')
    if(ind){ind.classList.add('show');setTimeout(()=>ind.classList.remove('show'),1500)}
  }
  function load(){
    try{
      const raw=localStorage.getItem(STORE_KEY);if(!raw)return false
      const d=JSON.parse(raw)
      timers=(d.timers||[]).map(t=>({...t,interval:null}))
      nextId=d.nextId||1; currentSound=d.currentSound||'beep'
      events=d.events||[]; nextEid=d.nextEid||1
      recs=(d.recs||[]).map(r=>({...r,firing:false})); nextRid=d.nextRid||1
      postits=d.postits||[]; nextPid=d.nextPid||1
      currentSide=d.side||'right'
      return true
    }catch(e){return false}
  }
  function clearAll(){
    if(!confirm('Apagar todos os dados?'))return
    try{localStorage.removeItem(STORE_KEY)}catch(e){}
    postits.forEach(p=>{ if(p.open) api.closePostit(p.id) })
    timers=[];events=[];recs=[];postits=[]
    nextId=1;nextEid=1;nextRid=1;nextPid=1
    renderTimers();renderAgenda();renderRecs();renderPostitList()
  }

  // ── painel ──
  function togglePanel(){ api.togglePanel() }
  window.togglePanel = togglePanel

  function switchSide(){
    currentSide = currentSide==='right'?'left':'right'
    document.body.className='panel-mode side-'+currentSide
    api.setSide(currentSide)
    save()
  }
  window.switchSide = switchSide

  api.onPanelState(({open,side})=>{
    currentSide=side
    document.body.className='panel-mode side-'+side+(open?' panel-open':'')
  })

  // ── tabs ──
  function switchTab(name,btn){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
    document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('active'))
    btn.classList.add('active')
    document.getElementById('pnl-'+name).classList.add('active')
  }
  window.switchTab=switchTab

  // ── notificações ──
  function requestNotif(){notifGranted=true;updateNotifBtn()}
  window.requestNotif=requestNotif
  function updateNotifBtn(){
    const btn=document.getElementById('notif-btn');if(!btn)return
    btn.textContent='🔔 Ativo';btn.classList.add('granted');notifGranted=true
  }
  function sendNotif(title,body){api.notify(title,body);api.alarmFired()}

  // ── som ──
  function selectSound(el){
    currentSound=el.value
    document.querySelectorAll('.sound-opt').forEach(l=>l.classList.remove('selected'))
    document.getElementById('sl-'+el.value).classList.add('selected')
    save()
  }
  window.selectSound=selectSound
  function applySound(){
    const el=document.querySelector(`input[name="sound"][value="${currentSound}"]`)
    if(el){el.checked=true;document.querySelectorAll('.sound-opt').forEach(l=>l.classList.remove('selected'));document.getElementById('sl-'+currentSound)?.classList.add('selected')}
  }
  function playSound(type){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)()
      if(type==='beep'){[0,.18,.36].forEach(d=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(0.3,ctx.currentTime+d);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d+0.25);o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+0.25)})}
      else if(type==='bell'){[0,.6,1.2].forEach((d,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=523-i*30;o.type='sine';g.gain.setValueAtTime(0.4,ctx.currentTime+d);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d+0.8);o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+0.8)})}
      else if(type==='digital'){for(let i=0;i<6;i++){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=i%2===0?1200:800;o.type='square';g.gain.setValueAtTime(0.15,ctx.currentTime+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.1+0.08);o.start(ctx.currentTime+i*0.1);o.stop(ctx.currentTime+i*0.1+0.08)}}
      else if(type==='soft'){[0,.5,1.0].forEach(d=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=432;o.type='sine';g.gain.setValueAtTime(0,ctx.currentTime+d);g.gain.linearRampToValueAtTime(0.25,ctx.currentTime+d+0.3);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d+1.2);o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+1.2)})}
    }catch(e){}
  }
  window.playSound=playSound

  // ── timers ──
  function fmt(sec){return String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0')}
  function renderTimers(){
    const list=document.getElementById('timers-list');if(!list)return
    if(!timers.length){list.innerHTML='<p class="empty-msg">Nenhum timer ainda.</p>';return}
    list.innerHTML=timers.map(t=>`
      <div class="timer-card card ${t.running?'running':''} ${t.done?'done':''}" id="tc-${t.id}">
        <div class="t-dot" style="background:${t.color}"></div>
        <div class="t-info"><div class="t-name">${t.name}</div><div class="t-meta">${t.type==='repeat'?'Recorrente':'Único'} · ${t.totalMin}min</div></div>
        <div class="t-display ${t.done?'done':''}" id="td-${t.id}">${fmt(t.remaining)}</div>
        ${!t.done?`<button class="tbtn" onclick="toggleTimer(${t.id})">${t.running?'⏸':'▶'}</button>`:''}
        ${t.done&&t.type==='repeat'?`<button class="tbtn" onclick="resetTimer(${t.id})">↺</button>`:''}
        <button class="tbtn danger" onclick="removeTimer(${t.id})">✕</button>
      </div>`).join('')
  }
  function toggleTimer(id){
    const t=timers.find(x=>x.id===id);if(!t)return
    if(t.running){clearInterval(t.interval);t.running=false;save()}
    else{
      t.running=true;t.done=false
      t.interval=setInterval(()=>{
        t.remaining--
        const d=document.getElementById('td-'+t.id);if(d)d.textContent=fmt(t.remaining)
        if(t.remaining<=0){
          clearInterval(t.interval);t.running=false;t.done=true
          renderTimers();playSound(currentSound)
          sendNotif('Timer concluído!','"'+t.name+'" terminou.')
          save()
          if(t.type==='repeat')setTimeout(()=>{resetTimer(id);toggleTimer(id)},1000)
        }
      },1000)
    }
    renderTimers();save()
  }
  window.toggleTimer=toggleTimer
  function resetTimer(id){const t=timers.find(x=>x.id===id);if(!t)return;clearInterval(t.interval);t.remaining=t.totalMin*60;t.running=false;t.done=false;renderTimers();save()}
  window.resetTimer=resetTimer
  function removeTimer(id){const t=timers.find(x=>x.id===id);if(t)clearInterval(t.interval);timers=timers.filter(x=>x.id!==id);renderTimers();save()}
  window.removeTimer=removeTimer
  function addTimer(){
    const name=document.getElementById('f-name').value.trim()||'Timer'
    const min=parseInt(document.getElementById('f-min').value)||25
    const type=document.getElementById('f-type').value
    const color=document.getElementById('f-color').value
    timers.push({id:nextId++,name,totalMin:min,remaining:min*60,type,color,running:false,done:false,interval:null})
    document.getElementById('f-name').value=''
    renderTimers();save()
  }
  window.addTimer=addTimer

  // ── recorrências ──
  function setRecType(type,btn){
    document.querySelectorAll('.type-tab').forEach(t=>t.classList.remove('active'))
    btn.classList.add('active')
    ['daily','weekly','hourly','monthly'].forEach(t=>{document.getElementById('rf-'+t).style.display=t===type?'block':'none'})
  }
  window.setRecType=setRecType
  function toggleWd(el){el.classList.toggle('on')}
  window.toggleWd=toggleWd
  function getSelectedWds(){return[...document.querySelectorAll('#wd-picker .wd.on')].map(el=>parseInt(el.dataset.d))}
  function recDetailStr(r){
    if(r.type==='daily')return'Todo dia às '+r.time
    if(r.type==='weekly')return r.days.map(d=>WDNAMES[d]).join(', ')+' às '+r.time
    if(r.type==='hourly')return'A cada '+r.interval+'h ('+r.start+'–'+r.end+')'
    if(r.type==='monthly')return'Dia '+r.day+' às '+r.time
    return''
  }
  function nextFireStr(r){
    const now=new Date(),pad=n=>String(n).padStart(2,'0')
    const hhmm=pad(now.getHours())+':'+pad(now.getMinutes())
    if(r.type==='daily')return'Próximo: '+(r.time>hhmm?'hoje':'amanhã')+' às '+r.time
    if(r.type==='weekly'){
      if(!r.days||!r.days.length)return'Nenhum dia'
      const wd=now.getDay()
      for(let i=0;i<8;i++){const c=(wd+i)%7;if(r.days.includes(c)){if(i===0&&r.time>hhmm)return'Próximo: hoje às '+r.time;if(i===0)continue;return'Próximo: '+(i===1?'amanhã':WDNAMES[c])+' às '+r.time}}
      return''
    }
    if(r.type==='hourly'){
      const[sh,sm]=r.start.split(':').map(Number),[eh]=r.end.split(':').map(Number)
      const nowMin=now.getHours()*60+now.getMinutes(),startMin=sh*60+sm,endMin=eh*60+(parseInt(r.end.split(':')[1])||0),iv=r.interval*60
      for(let m=startMin;m<=endMin;m+=iv)if(m>nowMin)return'Próximo: '+pad(Math.floor(m/60))+':'+pad(m%60)
      return'Amanhã às '+r.start
    }
    if(r.type==='monthly'){const day=parseInt(r.day),ok=now.getDate()<day||(now.getDate()===day&&r.time>hhmm);return'Dia '+day+' ('+(ok?'este':'próx.')+' mês) às '+r.time}
    return''
  }
  function addRec(type){
    let rec={id:nextRid++,type,muted:false,firing:false}
    if(type==='daily'){rec.name=document.getElementById('r-daily-name').value.trim()||'Alarme';rec.time=document.getElementById('r-daily-time').value||'08:00';document.getElementById('r-daily-name').value=''}
    else if(type==='weekly'){rec.name=document.getElementById('r-weekly-name').value.trim()||'Alarme';rec.time=document.getElementById('r-weekly-time').value||'19:00';rec.days=getSelectedWds();if(!rec.days.length){alert('Selecione pelo menos um dia.');return};document.getElementById('r-weekly-name').value=''}
    else if(type==='hourly'){rec.name=document.getElementById('r-hourly-name').value.trim()||'Lembrete';rec.interval=parseInt(document.getElementById('r-hourly-interval').value)||4;rec.start=document.getElementById('r-hourly-start').value||'08:00';rec.end=document.getElementById('r-hourly-end').value||'22:00';document.getElementById('r-hourly-name').value=''}
    else if(type==='monthly'){rec.name=document.getElementById('r-monthly-name').value.trim()||'Alarme';rec.day=parseInt(document.getElementById('r-monthly-day').value)||10;rec.time=document.getElementById('r-monthly-time').value||'09:00';document.getElementById('r-monthly-name').value=''}
    recs.push(rec);renderRecs();save()
  }
  window.addRec=addRec
  function toggleMute(id){const r=recs.find(x=>x.id===id);if(!r)return;r.muted=!r.muted;renderRecs();save()}
  window.toggleMute=toggleMute
  function removeRec(id){recs=recs.filter(x=>x.id!==id);renderRecs();save()}
  window.removeRec=removeRec
  function renderRecs(){
    const list=document.getElementById('rec-list');if(!list)return
    if(!recs.length){list.innerHTML='<p class="empty-msg">Nenhum alarme recorrente.</p>';return}
    list.innerHTML=recs.map(r=>{
      const next=nextFireStr(r),isSoon=next.includes('hoje')||next.includes('amanhã')
      return`<div class="rec-card card ${r.muted?'muted':''} ${r.firing?'firing':''}" id="rc-${r.id}">
        <div class="rec-icon ${ICONCLASS[r.type]}">${ICONS[r.type]}</div>
        <div class="rec-info"><div class="rec-name">${r.name}</div><div class="rec-detail">${recDetailStr(r)}</div><div class="rec-next ${isSoon?'soon':''}">${r.muted?'Silenciado':next}</div></div>
        <button class="tbtn ${r.muted?'':'mute'}" onclick="toggleMute(${r.id})">${r.muted?'Ativar':'Silence'}</button>
        <button class="tbtn danger" onclick="removeRec(${r.id})">✕</button>
      </div>`
    }).join('')
  }

  // ── agenda ──
  function todayStr(){return new Date().toISOString().slice(0,10)}
  function nowHHMM(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')}
  function fmtDate(str){const[y,m,d]=str.split('-');return d+'/'+m+'/'+y}
  function catLabel(c){return{work:'Trabalho',pessoal:'Pessoal',saude:'Saúde',outro:'Outro'}[c]||c}
  function buildEvtCard(e){
    const today=todayStr(),past=e.fired===true,dateStr=e.date===today?'hoje':fmtDate(e.date),isEditing=editingId===e.id
    return`<div class="evt-card ${past?'past':''}" id="ecard-${e.id}">
      <div class="evt-main" onclick="toggleEdit(${e.id})">
        <div class="evt-time-col"><div class="evt-time">${e.time}</div><div class="evt-datestr">${dateStr}</div></div>
        <div class="evt-info"><div class="evt-title">${e.title}</div>${e.desc?`<div class="evt-desc">${e.desc}</div>`:''}</div>
        <div class="evt-right"><span class="a-cat cat-${e.cat}">${catLabel(e.cat)}</span><span style="font-size:10px;color:var(--text3);">${isEditing?'▲':'▼'}</span></div>
      </div>
      <div class="evt-edit-form ${isEditing?'open':''}" id="eform-${e.id}">
        <div class="edit-row">
          <div class="efg"><label>Título</label><input type="text" id="et-${e.id}" value="${e.title}" style="width:110px;"/></div>
          <div class="efg"><label>Data</label><input type="date" id="ed-${e.id}" value="${e.date}" style="width:120px;"/></div>
        </div>
        <div class="edit-row">
          <div class="efg"><label>Hora</label><input type="time" id="eh-${e.id}" value="${e.time}" style="width:85px;"/></div>
          <div class="efg"><label>Cat.</label><select id="ec-${e.id}"><option value="work" ${e.cat==='work'?'selected':''}>Trabalho</option><option value="pessoal" ${e.cat==='pessoal'?'selected':''}>Pessoal</option><option value="saude" ${e.cat==='saude'?'selected':''}>Saúde</option><option value="outro" ${e.cat==='outro'?'selected':''}>Outro</option></select></div>
        </div>
        <div class="edit-row">
          <div class="efg"><label>Descrição</label><input type="text" id="edesc-${e.id}" value="${e.desc||''}" style="width:160px;"/></div>
          <button class="btn-save" onclick="saveEdit(${e.id})">✓</button>
          <button class="btn-cancel" onclick="cancelEdit()">✕</button>
          <button class="btn-del" onclick="removeEvent(${e.id})">🗑</button>
        </div>
      </div>
    </div>`
  }
  function renderAgenda(){
    const today=todayStr()
    const lbl=document.getElementById('today-label');if(lbl)lbl.textContent=fmtDate(today)
    const todayPending=events.filter(e=>e.date===today&&!e.fired).sort((a,b)=>a.time.localeCompare(b.time))
    const future=events.filter(e=>e.date>today&&!e.fired).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time))
    const past=events.filter(e=>e.fired).sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time))
    const set=(id,items,empty)=>{const el=document.getElementById(id);if(el)el.innerHTML=items.length?items.map(buildEvtCard).join(''):`<p class="empty-msg">${empty}</p>`}
    set('agenda-today',todayPending,'Nenhum evento pendente hoje.')
    set('agenda-upcoming',future,'Nenhum evento futuro.')
    set('agenda-past',past,'Nenhum evento passado.')
  }
  function toggleEdit(id){editingId=editingId===id?null:id;renderAgenda()}
  window.toggleEdit=toggleEdit
  function cancelEdit(){editingId=null;renderAgenda()}
  window.cancelEdit=cancelEdit
  function saveEdit(id){
    const e=events.find(x=>x.id===id);if(!e)return
    e.title=document.getElementById('et-'+id).value.trim()||e.title
    e.date=document.getElementById('ed-'+id).value||e.date
    e.time=document.getElementById('eh-'+id).value||e.time
    e.cat=document.getElementById('ec-'+id).value
    e.desc=document.getElementById('edesc-'+id).value.trim()
    editingId=null;renderAgenda();save()
  }
  window.saveEdit=saveEdit
  function removeEvent(id){events=events.filter(e=>e.id!==id);if(editingId===id)editingId=null;renderAgenda();save()}
  window.removeEvent=removeEvent
  function addEvent(){
    const title=document.getElementById('a-title').value.trim();if(!title)return
    const date=document.getElementById('a-date').value,time=document.getElementById('a-time').value
    if(!date||!time)return
    events.push({id:nextEid++,title,date,time,cat:document.getElementById('a-cat').value,desc:document.getElementById('a-desc').value.trim(),fired:false})
    document.getElementById('a-title').value='';document.getElementById('a-desc').value=''
    renderAgenda();save()
  }
  window.addEvent=addEvent

  // ── alarmes ──
  function checkAlarms(){
    const today=todayStr(),hhmm=nowHHMM(),now=new Date(),pad=n=>String(n).padStart(2,'0'),wd=now.getDay()
    events.forEach(e=>{if(!e.fired&&e.date===today&&e.time===hhmm){e.fired=true;playSound(currentSound);sendNotif('Lembrete: '+e.title,e.desc||e.time);renderAgenda();save()}})
    recs.forEach(r=>{
      if(r.muted)return
      let fire=false
      if(r.type==='daily'&&r.time===hhmm)fire=true
      if(r.type==='weekly'&&r.days&&r.days.includes(wd)&&r.time===hhmm)fire=true
      if(r.type==='monthly'&&now.getDate()===parseInt(r.day)&&r.time===hhmm)fire=true
      if(r.type==='hourly'){const[sh,sm]=r.start.split(':').map(Number),[eh,em]=r.end.split(':').map(Number);const startMin=sh*60+sm,endMin=eh*60+em,iv=r.interval*60;for(let m=startMin;m<=endMin;m+=iv)if(pad(Math.floor(m/60))+':'+pad(m%60)===hhmm){fire=true;break}}
      if(fire){r.firing=true;playSound(currentSound);sendNotif('Lembrete: '+r.name,recDetailStr(r));renderRecs();setTimeout(()=>{r.firing=false;renderRecs()},5000)}
    })
  }
  setInterval(checkAlarms,30000)

  // ── post-its ──
  function renderPostitList(){
    const list=document.getElementById('postits-list');if(!list)return
    if(!postits.length){list.innerHTML='<p class="empty-msg">Nenhum post-it ainda.</p>';return}
    list.innerHTML=postits.map(p=>`
      <div class="postit-item">
        <div class="pi-dot" style="background:${p.color};border-radius:2px;"></div>
        <span class="pi-preview">${p.text||'(vazio)'}</span>
        <button class="tbtn" onclick="reopenPostit('${p.id}')" title="${p.open?'Já aberto':'Abrir'}">${p.open?'↗':'Abrir'}</button>
        <button class="tbtn danger" onclick="deletePostit('${p.id}')">✕</button>
      </div>`).join('')
  }
  function addPostit(){
    const id='p'+nextPid++
    const color=piColors[nextPid%piColors.length]
    const p={id,color,text:'',x:300,y:200,w:200,h:160,open:true}
    postits.push(p)
    api.openPostit(p)
    renderPostitList();save()
  }
  window.addPostit=addPostit
  function reopenPostit(id){
    const p=postits.find(x=>x.id===id);if(!p)return
    if(!p.open){p.open=true;api.openPostit(p);renderPostitList();save()}
  }
  window.reopenPostit=reopenPostit
  function deletePostit(id){
    const p=postits.find(x=>x.id===id);if(!p)return
    if(p.open)api.closePostit(id)
    postits=postits.filter(x=>x.id!==id)
    renderPostitList();save()
  }
  window.deletePostit=deletePostit

  // IPC: post-it foi movido/redimensionado no desktop
  api.onPostitMoved(({id,x,y,w,h})=>{
    const p=postits.find(q=>q.id===id);if(p){p.x=x;p.y=y;p.w=w;p.h=h;save()}
  })
  // IPC: post-it foi fechado pelo X da janela
  api.onPostitClosed(({id})=>{
    const p=postits.find(q=>q.id===id);if(p){p.open=false;renderPostitList();save()}
  })
  // IPC: texto editado na janela do post-it
  api.onPostitUpdated(({id,text,color})=>{
    const p=postits.find(q=>q.id===id);if(p){p.text=text;p.color=color;renderPostitList();save()}
  })

  // ── init ──
  const loaded=load()
  updateNotifBtn()
  applySound()

  // Aplica lado salvo
  document.body.className='panel-mode side-'+currentSide
  api.setSide(currentSide)

  renderTimers();renderRecs();renderAgenda();renderPostitList()
  const adate=document.getElementById('a-date');if(adate)adate.value=todayStr()
  const atime=document.getElementById('a-time');if(atime)atime.value='09:00'

  if(!loaded){
    const d=todayStr()
    events.push({id:nextEid++,title:'Reunião de equipe',date:d,time:'14:00',cat:'work',desc:'Call semanal',fired:false})
    const tom=new Date();tom.setDate(tom.getDate()+1)
    events.push({id:nextEid++,title:'Academia',date:tom.toISOString().slice(0,10),time:'07:00',cat:'saude',desc:'',fired:false})
    recs.push({id:nextRid++,type:'daily',name:'Remédio',time:'08:00',muted:false,firing:false})
    renderAgenda();renderRecs();save()
  }

  // Reabre post-its que estavam abertos na última sessão
  postits.forEach(p=>{ if(p.open) api.openPostit(p) })
  notifGranted=true
}
</script>
</body>
</html>
